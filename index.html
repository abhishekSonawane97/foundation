<h1 id="hero_title"></h1>
<img id="hero_image" loading="lazy" width="800" />
<p id="about_text"></p>

<p id="about_sub_text"></p>

<script>
fetch('/content/content.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('hero_title').innerText = data.hero_title;
    document.getElementById('about_text').innerText = data.about_text;
    document.getElementById('about_sub_text').innerText = data.about_sub_text;

});
</script>
<script>
fetch('/content/content.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('hero_image').src = data.hero_image;
  });
</script>
